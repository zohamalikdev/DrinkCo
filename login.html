<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrinkCo-SignIN</title>
    <!-- link to font awesome for inserting icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- lets link google font for inserting font families -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
        rel="stylesheet">
    <!-- link to css file -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-login">
    <div class="admin-logo">
        Drink<span>Co</span>
    </div>

    <h2>Admin Login</h2>

    <form method="POST">
        <label>Email</label><br>
        <input type="text" name="email" required><br><br>

        <label>Password</label><br>
        <input type="password" name="password" required><br><br>


        <button type="submit" name="login">Login</button>


        <div class="back-link">
            <a href="index.html"> Back to DrinkCo</a>
        </div>
    </form>
</body>

</html>
